<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Calorie Tracker</title>
  <link rel="stylesheet" href="styles.css">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>

  <div class="hero">
    <div class="hero-glow"></div>
    <div class="container">
      <div class="hero-content">
        <h1>Calorie Tracker</h1>
        <p class="tagline">Il tuo diario alimentare intelligente</p>
      </div>
    </div>
  </div>

  <div class="container main-content">

    <!-- Ring + Stats inline -->
    <div class="stats-row fade-in">
      <div class="ring-container">
        <svg class="ring-svg" viewBox="0 0 120 120">
          <circle class="ring-bg" cx="60" cy="60" r="52" />
          <circle class="ring-fill" id="ring-fill" cx="60" cy="60" r="52" />
        </svg>
        <div class="ring-center">
          <span class="ring-pct" id="progress-pct">0%</span>
          <span class="ring-label">completato</span>
        </div>
      </div>
      <div class="stats-cards">
        <div class="stat-card" id="card-goal">
          <span class="stat-dot dot-violet"></span>
          <div class="stat-text">
            <span class="stat-value" id="goal-value">--</span>
            <span class="stat-label">Obiettivo</span>
          </div>
        </div>
        <div class="stat-card" id="card-consumed">
          <span class="stat-dot dot-coral"></span>
          <div class="stat-text">
            <span class="stat-value" id="consumed-value">--</span>
            <span class="stat-label">Consumate</span>
          </div>
        </div>
        <div class="stat-card" id="card-remaining">
          <span class="stat-dot dot-mint"></span>
          <div class="stat-text">
            <span class="stat-value" id="remaining-value">--</span>
            <span class="stat-label">Rimanenti</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Hidden progress bar for JS compat -->
    <div style="display:none">
      <div class="progress-bar" id="progress-bar"></div>
    </div>

    <!-- Goal Form -->
    <form id="goal-form" class="form-card glass fade-in" style="animation-delay: 0.15s">
      <div class="form-label-row">
        <span class="form-badge badge-violet">Obiettivo</span>
      </div>
      <div class="inline-form">
        <div class="field">
          <input type="text" id="goal-input" inputmode="numeric" pattern="[0-9]*" placeholder="2200" autocomplete="off" required>
          <span class="field-unit">kcal</span>
        </div>
        <button type="submit" class="btn-primary">Imposta</button>
      </div>
    </form>

    <!-- Entry Form -->
    <form id="entry-form" class="form-card glass fade-in" style="animation-delay: 0.25s">
      <div class="form-label-row">
        <span class="form-badge badge-coral">Nuovo pasto</span>
      </div>
      <div class="field-stack">
        <div class="field-row-2">
          <div class="field field-select">
            <select id="meal-select" required>
              <option value="">Pasto...</option>
              <option value="colazione">Colazione</option>
              <option value="pranzo">Pranzo</option>
              <option value="cena">Cena</option>
              <option value="spuntino">Spuntino</option>
            </select>
            <svg class="select-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 9l6 6 6-6"/></svg>
          </div>
          <div class="field">
            <input type="text" id="kcal-input" inputmode="numeric" pattern="[0-9]*" placeholder="0" autocomplete="off" required>
            <span class="field-unit">kcal</span>
          </div>
        </div>
        <div class="field field-full">
          <input type="text" id="desc-input" placeholder="Cosa hai mangiato?" autocomplete="off" required>
        </div>
        <button type="submit" class="btn-primary btn-block">
          <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
          Aggiungi
        </button>
      </div>
    </form>

    <!-- Entries -->
    <div class="entries-section glass fade-in" style="animation-delay: 0.35s">
      <div class="entries-header">
        <h2>Pasti di oggi</h2>
        <button id="reset-btn" class="btn-ghost-danger">Reset</button>
      </div>
      <div id="entries-list"></div>
      <div id="empty-msg" class="empty-state">
        <div class="empty-icon">&#127869;</div>
        <p>Nessun pasto registrato</p>
        <span>Aggiungi il tuo primo pasto</span>
      </div>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
